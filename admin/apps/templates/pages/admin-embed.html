{% extends 'layouts/vertical.html' %}

{% block title %}Cars{% endblock %}

{% block page_content %}
<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-header d-flex align-items-center justify-content-between">
        <h4 class="card-title m-0">Cars</h4>
        <div class="d-flex align-items-center gap-2">
          <select id="marcaFilter" class="form-select form-select-sm" style="width:auto"></select>
          <select id="modelFilter" class="form-select form-select-sm" style="width:auto"></select>
          <button id="reloadBtn" class="btn btn-sm btn-outline-secondary">Reload</button>
          <button id="addBtn" class="btn btn-sm btn-success">Add</button>
        </div>
      </div>

      <div class="card-body">
        <div id="carsAlert" class="alert alert-danger d-none" role="alert"></div>
        <div id="carsLoading" class="d-flex align-items-center">
          <div class="spinner-border text-primary me-2" role="status" style="width: 1.5rem; height: 1.5rem;"></div>
          <span>Loading cars...</span>
        </div>

        <div class="table-responsive mt-3">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th scope="col" style="width: 40px;">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="selectAllCheckbox">
                  </div>
                </th>
                <th scope="col">ID</th>
                <th scope="col">Image</th>
                <th scope="col">Brand</th>
                <th scope="col">Model</th>
                <th scope="col">Category</th>
                <th scope="col">Fuel</th>
                <th scope="col">Transmission</th>
                <th scope="col">Drive Type</th>
                <th scope="col">Seats</th>
                <th scope="col">Luggage</th>
                <th scope="col">Price</th>
                <th scope="col">Created</th>
                <th scope="col" class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="carsTbody"></tbody>
          </table>
        </div>
      </div>

      <div class="card-footer d-flex justify-content-between align-items-center">
        <div>
          <small id="carsCount" class="text-muted"></small>
          <button id="bulkSaveBtn" class="btn btn-sm btn-success ms-3 d-none">Save Changes</button>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button id="prevBtn" class="btn btn-sm btn-outline-primary" disabled>Prev</button>
          <button id="nextBtn" class="btn btn-sm btn-primary">Next</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->

          </div>

          <div class="col-md-4">
            <label class="form-label">Category</label>
            <select name="category" id="categoryEdit" class="form-select" required>

      <div class="modal-footer">

{% block javascripts %}
<script>
(function () {
  // Use DB-backed endpoints
  const apiBase = '/api/cars';
  const limit = 12;
  let offset = 0;

  const tbody = document.getElementById('carsTbody');
  const loading = document.getElementById('carsLoading');
  const alertBox = document.getElementById('carsAlert');
  const countEl = document.getElementById('carsCount');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const reloadBtn = document.getElementById('reloadBtn');
  const addBtn = document.getElementById('addBtn');
  const marcaFilter = document.getElementById('marcaFilter');
  const modelFilter = document.getElementById('modelFilter');

  function formatPrice(currency, value) {
    if (!value) return '';
    try {
      const num = Number(value);
      return new Intl.NumberFormat(undefined, { style: 'currency', currency: currency || 'Lei' }).format(num);
    } catch (e) {
      return `${value} ${currency || ''}`.trim();
    }
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso.replace(' ', 'T'));
    return isNaN(d) ? iso : d.toLocaleString();
  }

  function setLoading(isLoading) {
    loading.classList.toggle('d-none', !isLoading);
  }

  function showError(message) {
    alertBox.textContent = message || 'Failed to load cars.';
    alertBox.classList.remove('d-none');
  }

  function clearError() {
    alertBox.classList.add('d-none');
    alertBox.textContent = '';
  }

  // Bulk edit state
  let selectedCarIds = new Set();
  let isBulkEditMode = false;
  let allMarcas = [];
  let allModels = [];

  function renderRows(items) {
    tbody.innerHTML = '';
    if (!items || items.length === 0) {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.colSpan = 14;
      td.className = 'text-center text-muted';
      td.textContent = 'No cars found';
      tr.appendChild(td);
      tbody.appendChild(tr);
      return;
    }

    for (const car of items) {
      const tr = document.createElement('tr');
      const isSelected = selectedCarIds.has(car.id);
      tr.innerHTML = `
        <td>
          <div class="form-check">
            <input class="form-check-input row-checkbox" type="checkbox" data-car-id="${car.id}" ${isSelected ? 'checked' : ''}>
          </div>
        </td>
        <td>${car.id ?? ''}</td>
        <td>
          ${car.img_id ? 
            `<div class="image-tooltip-container" style="position: relative; display: inline-block;">
              <img src="/images/${car.img_id}" alt="Car Image" class="img-thumbnail" style="width: 50px; height: 40px; object-fit: cover; cursor: pointer;" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
              <div class="image-tooltip" style="position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: white; border: 2px solid #ddd; border-radius: 8px; padding: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); z-index: 1000; display: none; max-width: 300px;">
                <img src="/images/${car.img_id}" alt="Car Image" style="max-width: 250px; max-height: 200px; object-fit: contain; display: block;">
              </div>
            </div>` + 
            '<span class="text-muted" style="display:none;">No image</span>' : 
            '<span class="text-muted">No image</span>'
          }
        </td>
        <td data-field="marca_id" data-original="${car.marca_id || ''}">${car.marca_name ?? ''}</td>
        <td data-field="model_id" data-original="${car.model_id || ''}">${car.model_name ?? ''}</td>
        <td data-field="category" data-original="${car.category || ''}">${car.category ?? ''}</td>
        <td data-field="fuel" data-original="${car.fuel || ''}">${car.fuel ?? ''}</td>
        <td data-field="transmission" data-original="${car.transmission || ''}">${car.transmission ?? ''}</td>
        <td data-field="drive_type" data-original="${car.drive_type || ''}">${car.drive_type ?? ''}</td>
        <td data-field="seats" data-original="${car.seats || ''}">${car.seats ?? ''}</td>
        <td data-field="luggage_capacity" data-original="${car.luggage_capacity || ''}">${car.luggage_capacity ?? ''}</td>
        <td data-field="price" data-original-price="${car.base_value || car.price_value || ''}" data-original-currency="${car.currency || 'Lei'}">${formatPrice(car.currency, (car.base_value ?? car.price_value))}</td>
        <td>${formatDate(car.created_date)}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-primary me-1" data-action="edit" data-id="${car.id}">Edit</button>
          <button class="btn btn-sm btn-outline-danger" data-action="delete" data-id="${car.id}">Delete</button>
        </td>
      `;
      tr.dataset.car = JSON.stringify(car);
      tr.dataset.carId = car.id;
      tbody.appendChild(tr);
    }
    
    // Add event listeners for image tooltips
    addImageTooltipListeners();
    
    // Update bulk edit mode if needed
    updateBulkEditMode();
  }
  
  function addImageTooltipListeners() {
    const containers = document.querySelectorAll('.image-tooltip-container');
    containers.forEach(container => {
      const img = container.querySelector('img');
      const tooltip = container.querySelector('.image-tooltip');
      
      if (img && tooltip) {
        img.addEventListener('mouseenter', function() {
          tooltip.style.display = 'block';
        });
        
        img.addEventListener('mouseleave', function() {
          tooltip.style.display = 'none';
        });
        
        // Also handle mouse events on the tooltip itself
        tooltip.addEventListener('mouseenter', function() {
          tooltip.style.display = 'block';
        });
        
        tooltip.addEventListener('mouseleave', function() {
          tooltip.style.display = 'none';
        });
      }
    });
  }

  async function load() {
    clearError();
    setLoading(true);
    try {
      const params = new URLSearchParams({ limit, offset, source: 'db' });
      const mid = marcaFilter.value;
      const modid = modelFilter.value;
      if (mid) params.set('marca_id', mid);
      if (modid) params.set('model_id', modid);
      const url = `${apiBase}?${params.toString()}`;
      const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderRows(data.items);

      const total = Number(data.total || 0);
      const start = Math.min(offset + 1, total === 0 ? 0 : total);
      const end = Math.min(offset + limit, total);
      countEl.textContent = total ? `Showing ${start}-${end} of ${total}` : 'No results';

      prevBtn.disabled = offset <= 0;
      nextBtn.disabled = offset + limit >= total;
    } catch (err) {
      let msg = 'Failed to load cars.';
      if (err && err.message) msg = err.message;
      showError(msg);
    } finally {
      setLoading(false);
    }
  }

  prevBtn.addEventListener('click', function () {
    if (offset <= 0) return;
    offset = Math.max(0, offset - limit);
    load();
  });

  nextBtn.addEventListener('click', function () {
    offset = offset + limit;
    load();
  });

  reloadBtn.addEventListener('click', function () {
    load();
  });

  async function loadMarcas() {
    try {
      const res = await fetch('/api/marcas');
      const items = await res.json();
      marcaFilter.innerHTML = '<option value="">All brands</option>' + items.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
    } catch (_) {}
  }

  async function loadModels(marcaId) {
    try {
      if (marcaId) {
        const res = await fetch(`/api/models?marca_id=${marcaId}`);
        const items = await res.json();
        modelFilter.innerHTML = '<option value="">All models</option>' + items.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
      } else {
        modelFilter.innerHTML = '<option value="">All models</option>';
      }
    } catch (_) {}
  }

  marcaFilter.addEventListener('change', async function () {
    offset = 0;
    await loadModels(this.value);
    load();
  });

  modelFilter.addEventListener('change', function () {
    offset = 0;
    load();

  async function handleSave(e) {
    e.preventDefault();
    clearError();
    const id = Number(editForm.elements['id'].value);

    // пїЅпїЅпїЅпїЅпїЅпїЅ: JSON пїЅпїЅпїЅ multipart
    const replaceImg = !!document.getElementById('replaceImgChk')?.checked;
    const replaceCover = !!document.getElementById('replaceCoverChk')?.checked;

    // пїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅ пїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅ пїЅ пїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅ multipart/form-data
    if (replaceImg || replaceCover) {
      try {
        saveBtn.disabled = true;
        const fd = new FormData(editForm);
        // пїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅпїЅ
        if (replaceImg) fd.set('replace_img', '1'); else fd.delete('replace_img');
        if (replaceCover) fd.set('replace_img_cover', '1'); else fd.delete('replace_img_cover');

        // пїЅпїЅпїЅпїЅпїЅпїЅ > пїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅ brand (пїЅпїЅпїЅ пїЅ пїЅ create)
        try {
          const mdlId = fd.get('model_id');
          if (mdlId) {
            const res = await fetch('/api/models');
            const all = await res.json();
            const found = all.find(m => String(m.id) === String(mdlId));
            if (found) fd.set('marca_id', String(found.marca_id || ''));
          }
        } catch (_) {}

        const res = await fetch(`${apiBase}/${id}`, { method: 'PUT', body: fd });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const modal = bootstrap.Modal.getInstance(editModal);
        if (modal) modal.hide();
        await load();
      } catch (err) {
        showError(err && err.message ? err.message : 'Save failed');
      } finally {
        saveBtn.disabled = false;
      }
      return;
    }

    // пїЅпїЅпїЅпїЅпїЅ пїЅ пїЅпїЅпїЅпїЅпїЅпїЅ JSON пїЅпїЅпїЅпїЅ (пїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅ, img пїЅпїЅпїЅпїЅ пїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅпїЅ)
    const fd = new FormData(editForm);
    const payload = {
      marca_id: fd.get('marca_id') ? Number(fd.get('marca_id')) : null,
      model_id: fd.get('model_id') ? Number(fd.get('model_id')) : null,
      // img_id пїЅ img_cover пїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅ пїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅ, пїЅпїЅпїЅпїЅпїЅ пїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅ
      price_id: fd.get('price_id') ? Number(fd.get('price_id')) : null,
      category: fd.get('category') || '',
      fuel: fd.get('fuel') || '',
      transmission: fd.get('transmission') || '',
      drive_type: fd.get('drive_type') || '',
      seats: fd.get('seats') ? Number(fd.get('seats')) : null,
      luggage_capacity: fd.get('luggage_capacity') ? Number(fd.get('luggage_capacity')) : null,
      currency: fd.get('currency') || 'Lei',
      // Отправляем base_value только если поле заполнено и не пустое
      base_value: (() => {
        const val = fd.get('base_value');
        if (val) {
          const strVal = String(val).trim();
          if (strVal !== '') {
            const num = Number(strVal);
            return isNaN(num) ? null : num;
          }
        }
        return null;
      })()
    };

    try {
      saveBtn.disabled = true;
      const res = await fetch(`${apiBase}/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const modal = bootstrap.Modal.getInstance(editModal);
      if (modal) modal.hide();
      await load();
    } catch (err) {
      showError(err && err.message ? err.message : 'Save failed');
    } finally {
      saveBtn.disabled = false;
    }
  }

      const items = await res.json();
      marcaEdit.innerHTML = '<option value="">-- select brand --</option>' + items.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
      
      // пїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅ selectedId, пїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅ

      else if (selectedName) {
        const found = items.find(m => m.name === selectedName);
        if (found) {
          marcaEdit.value = String(found.id);
        }
      }
      
      // пїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅ
      const currentMarcaId = marcaEdit.value;
      console.log('Loading models for marcaId:', currentMarcaId, 'with modelId:', modelId, 'modelName:', modelName);
      
      if (currentMarcaId) {
        // пїЅпїЅпїЅпїЅ пїЅпїЅпїЅ modelId, пїЅпїЅ пїЅпїЅпїЅпїЅ modelName, пїЅпїЅпїЅпїЅпїЅпїЅ modelId пїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅ
        let targetModelId = modelId;
        if (!targetModelId && modelName) {
          const modelsRes = await fetch(`/api/models?marca_id=${currentMarcaId}`);
          const models = await modelsRes.json();
          const foundModel = models.find(m => m.name === modelName);
          if (foundModel) {
            targetModelId = foundModel.id;
            console.log('Found modelId by name:', modelName, '->', targetModelId);
          }
        }
        await populateModelEdit(currentMarcaId, targetModelId);
      }
    } catch (error) {
      console.error('Error in populateMarcaEdit:', error);
    }

      bulkSaveBtn.classList.toggle('d-none', !isBulkEditMode);
    }

    // Update all rows
    const rows = tbody.querySelectorAll('tr[data-car-id]');
    rows.forEach(row => {
      const carId = Number(row.dataset.carId);
      const isSelected = selectedCarIds.has(carId);
      
      if (isBulkEditMode && isSelected) {
        makeRowEditable(row);
      } else {
        makeRowReadonly(row);
      }
    });

    // Update select all checkbox
    const selectAllCheckbox = document.getElementById('selectAllCheckbox');
    if (selectAllCheckbox) {
      const allRowsSelected = rows.length > 0 && Array.from(rows).every(r => selectedCarIds.has(Number(r.dataset.carId)));
      selectAllCheckbox.checked = allRowsSelected;
      selectAllCheckbox.indeterminate = selectedCount > 0 && selectedCount < rows.length;
    }
  }

  function makeRowEditable(row) {
    const car = JSON.parse(row.dataset.car);
    
    // Brand dropdown
    const marcaCell = row.querySelector('td[data-field="marca_id"]');
    if (marcaCell && !marcaCell.querySelector('select')) {
      const select = document.createElement('select');
      select.className = 'form-select form-select-sm';
      select.innerHTML = '<option value="">-- select --</option>' + 
        allMarcas.map(m => `<option value="${m.id}" ${m.id == car.marca_id ? 'selected' : ''}>${m.name}</option>`).join('');
      select.value = car.marca_id || '';
      select.addEventListener('change', async function() {
        const marcaId = this.value;
        const modelCell = row.querySelector('td[data-field="model_id"]');
        if (modelCell) {
          const modelSelect = modelCell.querySelector('select');
          if (modelSelect) {
            const models = await loadModelsForBulk(marcaId);
            modelSelect.innerHTML = '<option value="">-- select --</option>' + 
              models.map(m => `<option value="${m.id}" ${m.id == car.model_id ? 'selected' : ''}>${m.name}</option>`).join('');
            modelSelect.value = car.model_id || '';
          }
        }
      });
      marcaCell.innerHTML = '';
      marcaCell.appendChild(select);
    }

    // Model dropdown
    const modelCell = row.querySelector('td[data-field="model_id"]');
    if (modelCell && !modelCell.querySelector('select')) {
      const select = document.createElement('select');
      select.className = 'form-select form-select-sm';
      select.innerHTML = '<option value="">-- select --</option>';
      select.value = car.model_id || '';
      if (car.marca_id) {
        loadModelsForBulk(car.marca_id).then(models => {
          select.innerHTML = '<option value="">-- select --</option>' + 
            models.map(m => `<option value="${m.id}" ${m.id == car.model_id ? 'selected' : ''}>${m.name}</option>`).join('');
          select.value = car.model_id || '';
        });
      }
      modelCell.innerHTML = '';
      modelCell.appendChild(select);
    }

    // Category dropdown
    const categoryCell = row.querySelector('td[data-field="category"]');
    if (categoryCell && !categoryCell.querySelector('select')) {
      const select = document.createElement('select');
      select.className = 'form-select form-select-sm';
      const categories = ['Bus | Psg', 'Cabrio', 'Coupe', 'Hatchback', 'Minivan', 'MPV', 'Sedan', 'SUV', 'Universal'];
      select.innerHTML = '<option value="">-- select --</option>' + 
        categories.map(c => `<option value="${c}" ${c === car.category ? 'selected' : ''}>${c}</option>`).join('');
      categoryCell.innerHTML = '';
      categoryCell.appendChild(select);
    }

    // Fuel dropdown
    const fuelCell = row.querySelector('td[data-field="fuel"]');
    if (fuelCell && !fuelCell.querySelector('select')) {
      const select = document.createElement('select');
      select.className = 'form-select form-select-sm';
      const fuels = ['Motorina', 'Hybrid/Benzina', 'Benzina 95'];
      select.innerHTML = '<option value="">-- select --</option>' + 
        fuels.map(f => `<option value="${f}" ${f === car.fuel ? 'selected' : ''}>${f}</option>`).join('');
      fuelCell.innerHTML = '';
      fuelCell.appendChild(select);
    }

    // Transmission dropdown
    const transmissionCell = row.querySelector('td[data-field="transmission"]');
    if (transmissionCell && !transmissionCell.querySelector('select')) {
      const select = document.createElement('select');
      select.className = 'form-select form-select-sm';
      const transmissions = ['Automatic', 'Manual', 'Variator'];
      select.innerHTML = '<option value="">-- select --</option>' + 
        transmissions.map(t => `<option value="${t}" ${t === car.transmission ? 'selected' : ''}>${t}</option>`).join('');
      transmissionCell.innerHTML = '';
      transmissionCell.appendChild(select);
    }

    // Drive Type dropdown
    const driveTypeCell = row.querySelector('td[data-field="drive_type"]');
    if (driveTypeCell && !driveTypeCell.querySelector('select')) {
      const select = document.createElement('select');
      select.className = 'form-select form-select-sm';
      const driveTypes = ['Front', 'Rear', 'All'];
      select.innerHTML = '<option value="">-- select --</option>' + 
        driveTypes.map(d => `<option value="${d}" ${d === car.drive_type ? 'selected' : ''}>${d}</option>`).join('');
      driveTypeCell.innerHTML = '';
      driveTypeCell.appendChild(select);
    }

    // Seats input
    const seatsCell = row.querySelector('td[data-field="seats"]');
    if (seatsCell && !seatsCell.querySelector('input')) {
      const input = document.createElement('input');
      input.type = 'number';
      input.className = 'form-control form-control-sm';
      input.min = '1';
      input.max = '9';
      input.value = car.seats || '5';
      seatsCell.innerHTML = '';
      seatsCell.appendChild(input);
    }

    // Luggage input
    const luggageCell = row.querySelector('td[data-field="luggage_capacity"]');
    if (luggageCell && !luggageCell.querySelector('input')) {
      const input = document.createElement('input');
      input.type = 'number';
      input.className = 'form-control form-control-sm';
      input.min = '1';
      input.max = '5';
      input.value = car.luggage_capacity || '2';
      luggageCell.innerHTML = '';
      luggageCell.appendChild(input);
    }

    // Price input
    const priceCell = row.querySelector('td[data-field="price"]');
    if (priceCell && !priceCell.querySelector('input')) {
      const originalPrice = priceCell.dataset.originalPrice || '';
      const originalCurrency = priceCell.dataset.originalCurrency || 'Lei';
      const div = document.createElement('div');
      div.className = 'd-flex gap-1';
      const input = document.createElement('input');
      input.type = 'number';
      input.step = '0.01';
      input.className = 'form-control form-control-sm';
      input.value = originalPrice;
      input.placeholder = 'Price';
      const currencyInput = document.createElement('input');
      currencyInput.type = 'text';
      currencyInput.className = 'form-control form-control-sm';
      currencyInput.style.maxWidth = '70px';
      currencyInput.value = originalCurrency;
      currencyInput.readOnly = true; // Make currency readonly
      div.appendChild(input);
      div.appendChild(currencyInput);
      priceCell.innerHTML = '';
      priceCell.appendChild(div);
    }
  }

  function makeRowReadonly(row) {
    const car = JSON.parse(row.dataset.car);
    
    // Restore original values from car data
    const marcaCell = row.querySelector('td[data-field="marca_id"]');
    if (marcaCell) {
      marcaCell.textContent = car.marca_name || '';

    const modelCell = row.querySelector('td[data-field="model_id"]');
    if (modelCell) {
      modelCell.textContent = car.model_name || '';
    }

    const categoryCell = row.querySelector('td[data-field="category"]');
    if (categoryCell) {
      categoryCell.textContent = car.category || '';
    }

    const fuelCell = row.querySelector('td[data-field="fuel"]');
    if (fuelCell) {
      fuelCell.textContent = car.fuel || '';
    }

    const transmissionCell = row.querySelector('td[data-field="transmission"]');
    if (transmissionCell) {
      transmissionCell.textContent = car.transmission || '';
    }

    const driveTypeCell = row.querySelector('td[data-field="drive_type"]');
    if (driveTypeCell) {
      driveTypeCell.textContent = car.drive_type || '';
    }

    const seatsCell = row.querySelector('td[data-field="seats"]');
    if (seatsCell) {
      seatsCell.textContent = car.seats || '';
    }

    const luggageCell = row.querySelector('td[data-field="luggage_capacity"]');
    if (luggageCell) {
      luggageCell.textContent = car.luggage_capacity || '';
    }

    const priceCell = row.querySelector('td[data-field="price"]');
    if (priceCell) {
      priceCell.textContent = formatPrice(car.currency, (car.base_value ?? car.price_value));
    }
  }

  async function handleBulkSave() {
    const bulkSaveBtn = document.getElementById('bulkSaveBtn');
    if (!bulkSaveBtn) return;

    clearError();
    bulkSaveBtn.disabled = true;

    try {
      const rows = Array.from(tbody.querySelectorAll('tr[data-car-id]')).filter(r => selectedCarIds.has(Number(r.dataset.carId)));
      const updates = [];

      for (const row of rows) {
        const carId = Number(row.dataset.carId);
        const payload = {};

        // Get marca_id
        const marcaSelect = row.querySelector('td[data-field="marca_id"] select');
        if (marcaSelect && marcaSelect.value) {
          payload.marca_id = Number(marcaSelect.value);
        }

        // Get model_id
        const modelSelect = row.querySelector('td[data-field="model_id"] select');
        if (modelSelect && modelSelect.value) {
          payload.model_id = Number(modelSelect.value);
        }

        // Get category
        const categorySelect = row.querySelector('td[data-field="category"] select');
        if (categorySelect && categorySelect.value) {
          payload.category = categorySelect.value;
        }

        // Get fuel
        const fuelSelect = row.querySelector('td[data-field="fuel"] select');
        if (fuelSelect && fuelSelect.value) {
          payload.fuel = fuelSelect.value;
        }

        // Get transmission
        const transmissionSelect = row.querySelector('td[data-field="transmission"] select');
        if (transmissionSelect && transmissionSelect.value) {
          payload.transmission = transmissionSelect.value;
        }

        // Get drive_type
        const driveTypeSelect = row.querySelector('td[data-field="drive_type"] select');
        if (driveTypeSelect && driveTypeSelect.value) {
          payload.drive_type = driveTypeSelect.value;
        }

        // Get seats
        const seatsInput = row.querySelector('td[data-field="seats"] input');
        if (seatsInput && seatsInput.value) {
          payload.seats = Number(seatsInput.value);
        }

        // Get luggage_capacity
        const luggageInput = row.querySelector('td[data-field="luggage_capacity"] input');
        if (luggageInput && luggageInput.value) {
          payload.luggage_capacity = Number(luggageInput.value);
        }

        // Get price
        const priceDiv = row.querySelector('td[data-field="price"] div');
        if (priceDiv) {
          const priceInput = priceDiv.querySelector('input[type="number"]');
          const currencyInput = priceDiv.querySelector('input[type="text"]');
          if (priceInput && priceInput.value) {
            payload.base_value = Number(priceInput.value);
            payload.currency = currencyInput ? currencyInput.value : 'Lei';
          }
        }

        if (Object.keys(payload).length > 0) {
          updates.push({ carId, payload });
        }
      }

      // Save all updates
      let hasErrors = false;
      const errors = [];
      for (const { carId, payload } of updates) {
        try {
          const res = await fetch(`${apiBase}/${carId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) {
            const errorText = await res.text().catch(() => `HTTP ${res.status}`);
            throw new Error(`HTTP ${res.status} for car ${carId}: ${errorText}`);
          }
        } catch (err) {
          console.error(`Error updating car ${carId}:`, err);
          hasErrors = true;
          errors.push(`Car ${carId}: ${err.message || err}`);
        }
      }

      // Clear selection before reload
      selectedCarIds.clear();
      updateBulkEditMode(); // Update UI state before reload
      
      // Small delay to ensure server processed all updates
      await new Promise(resolve => setTimeout(resolve, 100));
      
      // Reload data
      try {
        await load();
        // Show success message if no errors, or show errors if any
        if (hasErrors) {
          showError('Some cars were not updated: ' + errors.join('; '));
        } else {
          clearError();
        }
      } catch (loadErr) {
        console.error('Error reloading data:', loadErr);
        // If save was successful but reload failed, show a warning
        if (!hasErrors) {
          showError('Data saved but failed to reload. Please refresh the page.');
        } else {
          showError('Save completed with errors and reload failed. Please refresh the page.');
        }
      }
    } catch (err) {
      console.error('Bulk save error:', err);
      showError(err && err.message ? err.message : 'Bulk save failed');
    } finally {
      bulkSaveBtn.disabled = false;
    }
  }

  // Initial load + bindings
  document.addEventListener('DOMContentLoaded', function () {
    initModalRefs();
    initCreateRefs();
    loadMarcas();
    loadModels(); // пїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅ пїЅпїЅпїЅпїЅпїЅпїЅпїЅ
    loadMarcasForBulk();
    load();

    // handlers
    const ef = document.getElementById('carEditForm');
    if (ef) ef.addEventListener('submit', handleSave);

    const cf = document.getElementById('carCreateForm');
    if (cf) cf.addEventListener('submit', handleCreate);

    // Bulk edit handlers
    const bulkSaveBtn = document.getElementById('bulkSaveBtn');
    if (bulkSaveBtn) {
      bulkSaveBtn.addEventListener('click', handleBulkSave);
    }

    // Row checkbox handlers
    tbody.addEventListener('change', function(e) {
      if (e.target.classList.contains('row-checkbox')) {
        const carId = Number(e.target.dataset.carId);
        if (e.target.checked) {
          selectedCarIds.add(carId);
        } else {
          selectedCarIds.delete(carId);
        }
        updateBulkEditMode();
      }
    });

    // Select all checkbox
    const selectAllCheckbox = document.getElementById('selectAllCheckbox');
    if (selectAllCheckbox) {
      selectAllCheckbox.addEventListener('change', function() {
        const checkboxes = tbody.querySelectorAll('.row-checkbox');
        checkboxes.forEach(cb => {
          const carId = Number(cb.dataset.carId);
          cb.checked = this.checked;
          if (this.checked) {
            selectedCarIds.add(carId);
          } else {
            selectedCarIds.delete(carId);
          }
        });
        updateBulkEditMode();
      });
    }
  });

})();
</script>
