server {
    listen 80;
    server_name new.carsline.md www.new.carsline.md;
    
    # ===== НАСТРОЙКИ ДЛЯ БОЛЬШИХ ФАЙЛОВ =====
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    access_log /var/log/nginx/new.carsline.access.log;
    error_log  /var/log/nginx/new.carsline.error.log;

    # ===== КОРНЕВАЯ СТАТИКА - ГЛАВНАЯ СТРАНИЦА =====
    location / {
        root /usr/Projects/Carento_v2.0.0_Unzip-First/2.Carento_Development_SourceCode/dist;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # ===== СТАТИЧЕСКИЕ ФАЙЛЫ (CSS, JS, изображения) =====
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/Projects/Carento_v2.0.0_Unzip-First/2.Carento_Development_SourceCode/dist;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        
        # Правильные MIME типы
        location ~* \.css$ {
            add_header Content-Type text/css;
        }
        location ~* \.js$ {
            add_header Content-Type application/javascript;
        }
    }

    # ===== /cars > :8000 (как было) =====
    location = /cars {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /cars/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== корневой /api > Flask:5000 =====
    location ^~ /api/ {
        proxy_pass http://135.181.105.165:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_buffering off;
    }

    # (на всякий) /api-proxy > Flask:5000
    location ^~ /api-proxy/ {
        proxy_pass http://135.181.105.165:5000/api-proxy/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_buffering off;
    }

    # ===== редирект на слэш только для /admin =====
    location = /admin { return 301 /admin/; }

    # ===== /admin/static/* > /static/* (снятие префикса) =====
    location ^~ /admin/static/ {
        rewrite ^/admin/static/(.*)$ /static/$1 break;
        proxy_pass http://135.181.105.165:5000;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ===== /admin/api/* > /api/* (снятие префикса) =====
    location ^~ /admin/api/ {
        rewrite ^/admin/api/(.*)$ /api/$1 break;
        proxy_pass http://135.181.105.165:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_buffering off;
    }

    # ===== УНИВЕРСАЛЬНЫЙ ПРЕФИКС /admin/* =====
    location ^~ /admin/ {
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass http://135.181.105.165:5000;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_redirect ~^https?://[^/]+(/.*)$ /admin$1;
        proxy_redirect / /admin/;
        sub_filter_types text/html;
        sub_filter_once off;
        sub_filter 'href="/'   'href="/admin/';
        sub_filter 'src="/'    'src="/admin/';
        sub_filter 'action="/' 'action="/admin/';
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "default-src * data: blob: 'unsafe-inline' 'unsafe-eval'" always;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_buffering off;
    }

    # ===== корневая статика Flask =====
    location /static/ {
        proxy_pass http://135.181.105.165:5000/static/;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location = /favicon.ico {
        proxy_pass http://135.181.105.165:5000/static/images/favicon.ico;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}


