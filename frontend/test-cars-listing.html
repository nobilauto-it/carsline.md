<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Cars Listing - Working Sort & Filter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="sort-button-styles.css" rel="stylesheet">
    <style>
        .btn-sort {
            border: 1px solid #ddd;
            background: white;
            padding: 8px 12px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        .btn-sort:hover {
            background: #f8f9fa;
            border-color: #007bff;
        }
        .item-sort {
            display: inline-flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-left: 10px;
        }
        .dropdown-sort {
            border-left: 1px solid #ddd;
        }
        .box-item-sort {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .number-found {
            font-weight: bold;
            color: #666;
        }
        .card-journey-small {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        .card-journey-small:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .card-image {
            height: 200px;
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2>Test Cars Listing - Working Sort & Filter</h2>
        
        <!-- Controls Section -->
        <div class="row align-items-center mb-4">
            <div class="col-md-4">
                <div class="box-view-type">
                    <span class="text-sm-bold neutral-500 number-found">Loading...</span>
                </div>
            </div>
            <div class="col-md-8 text-end">
                <div class="box-item-sort">
                    <!-- Sort Direction Button -->
                    <a class="btn btn-sort" href="#" title="Переключить направление сортировки">
                        <svg width="18" height="18" viewbox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M8.25 6L5.25 3M5.25 3L2.25 6M5.25 3L5.25 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                            <path d="M9.75 12L12.75 15M12.75 15L15.75 12M12.75 15L12.75 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </a>
                    
                    <!-- Show Dropdown -->
                    <div class="item-sort border-1">
                        <span class="text-xs-medium neutral-500 mr-2">Show</span>
                        <div class="dropdown dropdown-sort border-1-right">
                            <button class="btn dropdown-toggle" id="dropdownSort2" type="button" data-bs-toggle="dropdown" aria-expanded="false" data-bs-display="static">
                                <span>20</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-light" aria-labelledby="dropdownSort2">
                                <li><a class="dropdown-item active" href="#">20</a></li>
                                <li><a class="dropdown-item" href="#">30</a></li>
                                <li><a class="dropdown-item" href="#">50</a></li>
                            </ul>
                        </div>
                    </div>
                    
                    <!-- Sort By Dropdown -->
                    <div class="item-sort border-1">
                        <span class="text-xs-medium neutral-500 mr-2">Sort by:</span>
                        <div class="dropdown dropdown-sort border-1-right">
                            <button class="btn dropdown-toggle" id="dropdownSort" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <span>Most Viewed</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-light m-0" aria-labelledby="dropdownSort">
                                <li><a class="dropdown-item active" href="#">Most Viewed</a></li>
                                <li><a class="dropdown-item" href="#">Recently search</a></li>
                                <li><a class="dropdown-item" href="#">Most popular</a></li>
                                <li><a class="dropdown-item" href="#">Top rated</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cars Grid -->
        <div class="box-grid-tours">
            <div class="row" id="carsGrid">
                <div class="col-12">
                    <div class="loading">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-2">Загрузка автомобилей...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav aria-label="Page navigation example" class="mt-4">
            <ul class="pagination justify-content-center" id="pagination">
                <!-- Pagination will be generated by JavaScript -->
            </ul>
        </nav>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Cars Loader Script -->
    <script src="dist/assets/js/cars_loader.js"></script>
</body>
</html>
