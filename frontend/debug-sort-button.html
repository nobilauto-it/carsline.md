<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Sort Button</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-sort {
            border: 1px solid #ddd;
            background: white;
            padding: 8px 12px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 40px;
            transition: all 0.3s ease;
        }
        .btn-sort:hover {
            background: #f8f9fa;
            border-color: #007bff;
        }
        .btn-sort.sort-asc {
            background: #e3f2fd;
            border-color: #2196f3;
            color: #1976d2;
        }
        .btn-sort.sort-desc {
            background: #f3e5f5;
            border-color: #9c27b0;
            color: #7b1fa2;
        }
        .debug-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1>Debug Sort Button</h1>
        
        <div class="debug-info">
            <strong>Отладочная информация:</strong><br>
            <div id="debugLog">Инициализация...</div>
        </div>

        <div class="mb-4">
            <h3>Кнопка сортировки:</h3>
            <a class="btn btn-sort" href="#" title="Переключить направление сортировки">
                <svg width="18" height="18" viewbox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8.25 6L5.25 3M5.25 3L2.25 6M5.25 3L5.25 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M9.75 12L12.75 15M12.75 15L15.75 12M12.75 15L12.75 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </a>
        </div>

        <div class="mb-4">
            <h3>Статус:</h3>
            <div id="status">Направление сортировки: <strong>desc</strong></div>
        </div>

        <div class="mb-4">
            <h3>API запросы:</h3>
            <div id="apiLog">Ожидание запросов...</div>
        </div>
    </div>

    <script>
        // Простой класс для отладки кнопки сортировки
        class SortButtonDebugger {
            constructor() {
                this.sortDirection = 'desc';
                this.debugLog = document.getElementById('debugLog');
                this.statusDiv = document.getElementById('status');
                this.apiLog = document.getElementById('apiLog');
                this.init();
            }

            log(message) {
                const timestamp = new Date().toLocaleTimeString();
                this.debugLog.innerHTML += `<br>[${timestamp}] ${message}`;
                console.log(message);
            }

            init() {
                this.log('Инициализация SortButtonDebugger...');
                
                const sortButton = document.querySelector('.btn-sort');
                this.log(`Найденная кнопка: ${sortButton ? 'ДА' : 'НЕТ'}`);
                
                if (sortButton) {
                    sortButton.addEventListener('click', (e) => {
                        this.log('КЛИК ПО КНОПКЕ СОРТИРОВКИ!');
                        e.preventDefault();
                        this.toggleSortDirection();
                    });
                    this.log('Обработчик событий добавлен успешно');
                } else {
                    this.log('ОШИБКА: Кнопка не найдена!');
                }
            }

            toggleSortDirection() {
                this.log('toggleSortDirection вызван');
                this.sortDirection = this.sortDirection === 'desc' ? 'asc' : 'desc';
                this.log(`Направление изменено на: ${this.sortDirection}`);
                
                this.updateVisualState();
                this.updateStatus();
                this.simulateApiRequest();
            }

            updateVisualState() {
                const sortButton = document.querySelector('.btn-sort');
                if (sortButton) {
                    sortButton.classList.remove('sort-asc', 'sort-desc');
                    sortButton.classList.add(`sort-${this.sortDirection}`);
                    
                    if (this.sortDirection === 'asc') {
                        sortButton.title = 'Сортировка по возрастанию (нажмите для убывания)';
                    } else {
                        sortButton.title = 'Сортировка по убыванию (нажмите для возрастания)';
                    }
                    
                    this.log(`Визуальное состояние обновлено: sort-${this.sortDirection}`);
                }
            }

            updateStatus() {
                const directionText = this.sortDirection === 'asc' ? 'asc (по возрастанию)' : 'desc (по убыванию)';
                this.statusDiv.innerHTML = `Направление сортировки: <strong>${directionText}</strong>`;
            }

            simulateApiRequest() {
                const apiUrl = `GET /cars?page=1&limit=15&sort_direction=${this.sortDirection}`;
                this.apiLog.innerHTML = `Последний запрос: <code>${apiUrl}</code>`;
                this.log(`API запрос: ${apiUrl}`);
            }
        }

        // Инициализируем отладчик
        const debugger = new SortButtonDebugger();
    </script>
</body>
</html>
